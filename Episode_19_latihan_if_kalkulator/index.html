<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Episode 19 - Latihan Kalkulator</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
	<div class="container py-5">
		<h1 class="mb-4">Episode 19 - Latihan Kalkulator</h1>

		<div class="mb-3">
			<label for="number1" class="form-label">Angka pertama:</label>
			<input type="number" id="number1" class="form-control">
		</div>

		<div class="mb-3">
			<label for="operator" class="form-label">Operator:</label>
			<input id="operator" placeholder="+ - * /" maxlength="1" class="form-control">
		</div>

		<div class="mb-3">
			<label for="number2" class="form-label">Angka pertama:</label>
			<input type="number" id="number2" class="form-control">
		</div>

		<button onclick="calculate()" class="btn btn-primary">Hitung</button>
		<p id="hasil" class="mt-3"></p>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	<script src="script.js"></script>
</body>
</html>
